name: Canopy Connect
description: >-
  Canopy Connect is an insurance infrastructure platform that lets consumers
  and businesses quickly and securely share property and casualty insurance
  information through integrations with 400+ carriers covering 95%+ of the
  U.S. auto and homeowners markets. The API returns structured policy,
  driver, vehicle, claims, and property data in seconds, replacing
  manual verification workflows used across mortgage lending, auto finance,
  insurance carriers, and embedded insurance products.
