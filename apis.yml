apis:
  - aid: canopy:canopy-connect-api
    name: Canopy Connect API
    description: >-
      The Canopy Connect API returns structured property and casualty
      insurance data directly from 400+ carriers in real time. Applications
      can verify coverage, retrieve policy documents, pull driver and
      vehicle details, and surface claims history in under a minute
      instead of the typical 30-minute manual verification process.
    humanURL: https://www.usecanopy.com/api
    tags:
      - Auto Insurance
